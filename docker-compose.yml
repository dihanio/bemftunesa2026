services:
  # === API Backend (api.bemftunesa.org) ===
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bemft-api
    environment:
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@db:27017/${DB_NAME:-bemft_db}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://bemftunesa.org,https://ims.bemftunesa.org}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # === Database (MongoDB) ===
  db:
    image: mongo:7.0
    container_name: bemft-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${DB_NAME:-bemft_db}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # === Redis (Cache + Queue) ===
  redis:
    image: redis:7-alpine
    container_name: bemft-redis
    restart: unless-stopped

