services:
  # === API Backend (NestJS) ===
  api:
    image: ghcr.io/dihanio/bemftunesa2026-api:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      - PORT=4000
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/docs', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - uploads_data:/app/backend/public/uploads
    networks:
      - default
    restart: unless-stopped

  # === Public Website (Next.js) ===
  public_web:
    image: ghcr.io/dihanio/bemftunesa2026-public_web:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_NAME: frontend
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_PUBLIC_URL: ${NEXT_PUBLIC_PUBLIC_URL}
        NEXT_PUBLIC_IMS_URL: ${NEXT_PUBLIC_IMS_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => r.statusCode >= 200 && r.statusCode < 400 ? process.exit(0) : process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
    restart: unless-stopped

  # === IMS Dashboard (Next.js) ===
  ims_web:
    image: ghcr.io/dihanio/bemftunesa2026-ims_web:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_NAME: ims
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_PUBLIC_URL: ${NEXT_PUBLIC_PUBLIC_URL}
        NEXT_PUBLIC_IMS_URL: ${NEXT_PUBLIC_IMS_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/login', (r) => r.statusCode >= 200 && r.statusCode < 400 ? process.exit(0) : process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
    restart: unless-stopped

  # === PKKMB Student Portal (Next.js) ===
  pkkmb_web:
    image: ghcr.io/dihanio/bemftunesa2026-pkkmb_web:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        APP_NAME: pkkmb
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_PUBLIC_URL: ${NEXT_PUBLIC_PUBLIC_URL}
        NEXT_PUBLIC_IMS_URL: ${NEXT_PUBLIC_IMS_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => r.statusCode >= 200 && r.statusCode < 400 ? process.exit(0) : process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
    restart: unless-stopped

  # === Caddy Reverse Proxy (auto-SSL) ===
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      public_web:
        condition: service_healthy
      ims_web:
        condition: service_healthy
      pkkmb_web:
        condition: service_healthy
    networks:
      - default

  # === Database (MongoDB 6) ===
  db:
    image: mongo:6
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: bemft-cms
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - default

  # === Redis Cache ===
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - default
    command: redis-server --appendonly yes

volumes:
  caddy_data:
  caddy_config:
  mongodb_data:
  redis_data:
  uploads_data:
