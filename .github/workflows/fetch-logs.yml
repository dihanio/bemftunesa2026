name: Fetch API Logs from VPS

on:
  workflow_dispatch:
    inputs:
      lines:
        description: 'Number of log lines to fetch'
        required: true
        default: '1000'

jobs:
  fetch_logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Docker logs
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Fetching all logs..."
            cd ${{ secrets.DEPLOY_PATH }} || exit 1
            docker compose ps
            echo "--- DB LOGS ---"
            docker compose logs --tail=100 db
            echo "--- API LOGS ---"
            docker compose logs --tail=${{ github.event.inputs.lines }} api
            echo "--- PKKMB LOGS ---"
            docker pull ghcr.io/dihanio/bemftunesa2026-pkkmb_web:latest && docker compose up -d --no-deps --force-recreate pkkmb_web
