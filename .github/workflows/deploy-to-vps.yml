name: Deploy to VPS (orchestrator)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  orchestrate_deploy_on_vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (minimal)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Trigger remote deploy on VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            echo "=> remote: ensure repo exists"
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard ${{ github.sha }}
            else
              git clone --depth 1 https://github.com/${{ github.repository }} .
              git fetch --all || true
              git checkout --force ${{ github.sha }} || true
              git reset --hard ${{ github.sha }} || true
            fi

            chmod +x ./scripts/deploy/vps_deploy.sh || true
            echo "=> remote: invoke vps_deploy.sh"
            GITHUB_SHA=${{ github.sha }} GITHUB_REF=${{ github.ref }} ./scripts/deploy/vps_deploy.sh ${{ github.sha }}

      - name: Fetch remote logs (last 2000 lines)
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            LOG_FILE=$(ls -1t "$DEPLOY_PATH"/deploy-logs/deploy-*.log 2>/dev/null | head -n1 || true)
            if [ -n "$LOG_FILE" ]; then
              echo "--- remote deploy log: $LOG_FILE ---"
              tail -n 2000 "$LOG_FILE" || true
            else
              echo "No remote log found"
            fi
