name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Deployment on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd bemftunesa2026
            git fetch origin main
            git reset --hard origin/main
            
            # Auto-generate permanent JWT_SECRET if missing
            if [ -f .env ] && ! grep -q "^JWT_SECRET=" .env; then
              echo "JWT_SECRET=$(openssl rand -hex 32)" >> .env
              echo "✅ Auto-generated permanent JWT_SECRET in VPS .env"
            elif [ ! -f .env ]; then
              echo "JWT_SECRET=$(openssl rand -hex 32)" > .env
              echo "✅ Created .env and auto-generated permanent JWT_SECRET"
            fi

            # Build services sequentially to prevent VPS out of memory (OOM)
            docker compose build api
            docker compose build public_web
            docker compose build ims_web
            docker compose build oprec_web
            
            # Start all services
            docker compose up -d
