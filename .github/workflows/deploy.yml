name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ~/bemftunesa2026
            git pull origin main
            # Clear host next build caches to avoid copying them into container
            rm -rf frontend/.next ims/.next
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker system prune -f
